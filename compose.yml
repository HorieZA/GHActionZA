services:
  mariadb:
    container_name: mariadb
    image: mariadb:12.1.2
    restart: always
    command: 
      - --local-infile=1
    ports:
      - 23306:3306
    networks:
      - ai-agent
    volumes:
      - ./conf.d:/etc/mysql/conf.d:ro
      - data-mariadb:/var/lib/mysql:rw
    environment:
      - MARIADB_HOST=localhost
      - MARIADB_PORT=23306
      - MARIADB_ROOT_PASSWORD=1234
      - MARIADB_DATABASE=db_board
      - TZ=Asia/Seoul
      - LC_ALL:en_US.UTF-8

  backend:
    container_name: backend
    build:
      context: .
      dockerfile: dockerfile
    image: uv:1
    ports:
      - 8001:8000
    networks:
      - ai-agent
    depends_on:
      - mariadb
    working_dir: /workspace
    volumes:
      - ./backend/main.py:/workspace/main.py:rw
      - ./backend/src:/workspace/src:rw
      - ./backend/pyproject.toml:/workspace/pyproject.toml:ro
      - ./backend/uv.lock:/workspace/uv.lock:rw
      - ./backend/.env:/workspace/.env:rw
      - uploads:/workspace/uploads:rw
    command: ["sleep", "infinity"]

  frontend:
    container_name: frontend
    image: nginx:1.28
    ports:
      - 80:80
    networks:
      - ai-agent
    working_dir: /workspace
    volumes:
      - ./frontend/public:/workspace/public:ro
      - ./frontend/src:/workspace/src:rw
      - ./frontend/eslint.config.js:/workspace/eslint.config.js:ro
      - ./frontend/index.html:/workspace/index.html:ro
      - ./frontend/package.json:/workspace/package.json:ro
      - ./frontend/vite.config.js:/workspace/vite.config.js:ro
      - ./frontend/.env:/workspace/.env:rw
      - ./frontend/default.conf:/etc/nginx/conf.d/default.conf:rw
    command: ["sleep", "infinity"]


networks:
  ai-agent:
    driver: bridge

volumes:
  data-mariadb:
    external: true # 기존 Volume 사용 옵션